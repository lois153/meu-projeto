<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema de Mensagens</title>
<link rel="stylesheet" href=".css">
</head>
<body>

<h1>Lista de Mensagens</h1>

<form id="formMensagem">

        type="text" 
        id="mensagem" 
        placeholder="Digite uma mensagem..."

<p id="erro"></p>

<ul id="lista"></ul>

<button id="btnFala">Clique para falar</button>

<script src=".js"></script>

</body>
</html>
